<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21212b"/>
      <stop offset="1" stop-color="#0c0c12"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="cam">
      <rect x="0" y="0" width="1024" height="1024" fill="black"/>
      <rect x="412" y="455" width="200" height="132" rx="30" fill="white"/>
      <rect x="468" y="432" width="88" height="34" rx="14" fill="white"/>
      <circle cx="512" cy="521" r="46" fill="black"/>
      <circle cx="512" cy="521" r="14" fill="white"/>
    </mask>
  </defs>
  <!-- DM family squircle with subtle depth + Tahoe-style glass rim -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="412" rx="185" fill="url(#rim)"/>
  <rect x="101.5" y="101.5" width="821" height="821" rx="183.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
  <!-- camera-in-viewfinder, pure white -->
  <g fill="none" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 300 384 L 300 300 L 384 300"/>
    <path d="M 640 300 L 724 300 L 724 384"/>
    <path d="M 300 640 L 300 724 L 384 724"/>
    <path d="M 724 640 L 724 724 L 640 724"/>
  </g>
  <rect x="0" y="0" width="1024" height="1024" fill="#ffffff" mask="url(#cam)"/>
</svg>
